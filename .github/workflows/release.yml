name: Release

# Workflow-level permissions are read-only by default; jobs that need
# elevated scope declare it on the job itself, following least-privilege.
# Only the `release` job creates the GitHub release and attests artefacts.
permissions:
    contents: read

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"

# Serialise releases per-tag so re-running a tag (or pushing two tags
# back-to-back) doesn't race on the same GitHub release page or
# attestation upload. Don't cancel an in-progress release — half-
# uploaded artefacts are worse than a queued duplicate.
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: "-Dwarnings"

jobs:
    validate:
        name: Validate Release
        runs-on: ubuntu-latest
        timeout-minutes: 5

        # Read-only: validate just inspects the tag and Cargo.toml.
        permissions:
            contents: read

        outputs:
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Determine version
              id: version
              shell: bash
              run: |
                TAG="${GITHUB_REF#refs/tags/}"

                # Validate tag format
                if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
                    echo "Error: Invalid tag format: $TAG"
                    echo "Expected format: v0.0.0 or v0.0.0-suffix"
                    exit 1
                fi

                VERSION="${TAG#v}"
                echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                echo "Release version: $VERSION (tag: $TAG)"

            - name: Verify Cargo.toml version matches tag
              shell: bash
              run: |
                # Extract the version from the [package] section specifically.
                # Plain `grep '^version'` would also match version pins under
                # [dependencies] etc.; this awk reads only after [package]
                # and stops on the first match, so it can't pick up the
                # wrong key.
                CARGO_VERSION=$(awk -F'"' '
                    /^\[package\]/ { in_pkg = 1; next }
                    /^\[/          { in_pkg = 0 }
                    in_pkg && /^version[[:space:]]*=/ { print $2; exit }
                ' Cargo.toml)
                TAG_VERSION="${{ steps.version.outputs.version }}"

                # For pre-release tags like v0.1.0-rc1, compare base version
                BASE_TAG_VERSION="${TAG_VERSION%%-*}"

                if [[ "$CARGO_VERSION" != "$BASE_TAG_VERSION" ]]; then
                    echo "Error: Version mismatch!"
                    echo "  Cargo.toml: $CARGO_VERSION"
                    echo "  Tag:        $BASE_TAG_VERSION"
                    echo ""
                    echo "Update Cargo.toml version before tagging."
                    exit 1
                fi

                echo "Version verified: $CARGO_VERSION"

    build:
        name: Build (${{ matrix.target }})
        needs: validate
        timeout-minutes: 30

        # Read-only: build compiles + uploads artefacts to the workflow's
        # ephemeral artifact store (no write to repo or releases).
        permissions:
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: altium-designer-mcp-linux-x86_64
                      binary: altium-designer-mcp

                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: altium-designer-mcp-macos-aarch64
                      binary: altium-designer-mcp

                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: altium-designer-mcp-windows-x86_64
                      binary: altium-designer-mcp.exe

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # v1.95.0 (latest stable)
              with:
                targets: ${{ matrix.target }}

            # No caching for release builds - they're one-off events triggered by
            # version tags, so caches would never be reused and just waste storage

            - name: Build release binary
              shell: bash
              run: cargo build --release --target ${{ matrix.target }} --verbose

            - name: Run tests
              shell: bash
              run: cargo test --release --target ${{ matrix.target }} --verbose

            - name: Prepare artifact (Unix)
              if: runner.os != 'Windows'
              shell: bash
              run: |
                mkdir -p dist
                cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
                cp README.md LICENCE CHANGELOG.md dist/
                cp config/example-config.json dist/
                cd dist
                tar -czvf ../${{ matrix.artifact }}.tar.gz *

            - name: Prepare artifact (Windows)
              if: runner.os == 'Windows'
              shell: bash
              run: |
                mkdir -p dist
                cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
                cp README.md LICENCE CHANGELOG.md dist/
                cp config/example-config.json dist/
                cd dist
                7z a -tzip ../${{ matrix.artifact }}.zip *

            - name: Upload artifact (Unix)
              if: runner.os != 'Windows'
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                name: ${{ matrix.artifact }}
                path: ${{ matrix.artifact }}.tar.gz
                retention-days: 1

            - name: Upload artifact (Windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                name: ${{ matrix.artifact }}
                path: ${{ matrix.artifact }}.zip
                retention-days: 1

    release:
        name: Create Release
        needs: [validate, build]
        runs-on: ubuntu-latest
        timeout-minutes: 10

        # The only job that needs elevated scope:
        # - `contents: write` to create the GitHub release
        # - `id-token: write` + `attestations: write` for SLSA build provenance
        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Download all artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                path: artifacts

            - name: List artifacts
              run: find artifacts -type f

            - name: Generate checksums
              shell: bash
              run: |
                cd artifacts
                find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} . \;
                sha256sum *.tar.gz *.zip > SHA256SUMS.txt
                cat SHA256SUMS.txt

            - name: Attest build provenance
              uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
              with:
                subject-path: |
                    artifacts/*.tar.gz
                    artifacts/*.zip

            - name: Extract release notes from CHANGELOG
              id: release-notes
              shell: bash
              run: |
                VERSION="${{ needs.validate.outputs.version }}"

                # Extract release notes for this version from CHANGELOG.md
                # Uses awk with index() for literal string matching (avoids regex escaping issues)
                awk -v ver="## [${VERSION}]" '
                    index($0, ver) == 1 { found=1; next }
                    found && /^## \[/ { exit }
                    found { print }
                ' CHANGELOG.md > release_notes.md

                # Trim leading/trailing blank lines
                sed -i '/./,$!d' release_notes.md
                sed -i ':a;/^[[:space:]]*$/{$d;N;ba}' release_notes.md

                if [[ -s release_notes.md ]]; then
                    echo "Found release notes in CHANGELOG.md:"
                else
                    echo "No CHANGELOG entry for ${VERSION}, using default"
                    echo "Release ${VERSION}" > release_notes.md
                fi

                echo "--- Release Notes ---"
                cat release_notes.md

            - name: Create GitHub Release
              shell: bash
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                TAG="${{ needs.validate.outputs.tag }}"
                VERSION="${{ needs.validate.outputs.version }}"

                # Build the flag list as an array so empty entries don't
                # rely on shell word-splitting (shellcheck-friendly,
                # robust if values ever contain spaces). A pre-release tag
                # (version containing '-', e.g. v0.2.0-rc1) must NOT be
                # marked --latest, or it would surface to users as the
                # current stable release.
                RELEASE_FLAGS=()
                if [[ "$VERSION" == *-* ]]; then
                    RELEASE_FLAGS+=(--prerelease --latest=false)
                else
                    RELEASE_FLAGS+=(--latest)
                fi

                # Create the release with gh CLI (more reliable than third-party actions)
                gh release create "$TAG" \
                    --title "$TAG" \
                    --notes-file release_notes.md \
                    "${RELEASE_FLAGS[@]}" \
                    artifacts/*.tar.gz \
                    artifacts/*.zip \
                    artifacts/SHA256SUMS.txt

                echo "Release created: $TAG"
