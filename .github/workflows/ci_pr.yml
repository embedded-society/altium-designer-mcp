name: CI - Pull Request

permissions:
    contents: read

on:
    pull_request:
        branches: ["**"]

    merge_group:
        types: [checks_requested]

    workflow_dispatch:

# Cancel superseded runs for the same ref. `github.ref` is unique per PR
# (refs/pull/N/merge) and is defined for every trigger here.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: "-Dwarnings"

jobs:
    quick-checks:
        name: Quick Checks (fmt, docs, markdown)
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Verify Rust toolchain pin consistency
              run: bash .github/scripts/check-toolchain-pin.sh

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # v1.95.0 (latest stable)
              with:
                components: rustfmt

            - name: Setup Node.js
              id: setup-node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                node-version: "lts/*"

            - name: Get markdownlint-cli2 version
              id: mdlint-version
              run: echo "version=$(npm view markdownlint-cli2 version)" >> "$GITHUB_OUTPUT"

            # Restore cache from main branch (read-only)
            - name: Restore npm cache
              uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                path: ~/.npm
                key: npm-markdownlint-${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-mdlint-${{ steps.mdlint-version.outputs.version }}

            - name: Install markdownlint-cli2
              run: npm install -g markdownlint-cli2

            - name: Check formatting
              run: cargo fmt --all --check

            - name: Lint markdown
              run: markdownlint-cli2 "**/*.md"

            - name: Check documentation
              run: cargo doc --no-deps --document-private-items
              env:
                RUSTDOCFLAGS: "-Dwarnings"

    build:
        name: Build (${{ matrix.os }})
        needs: quick-checks
        timeout-minutes: 20

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # v1.95.0 (latest stable)
              with:
                components: clippy

            - name: Get Rust version
              id: rust-version
              shell: bash
              run: |
                # Cross-platform: use shasum on macOS, sha256sum elsewhere
                if command -v sha256sum &> /dev/null; then
                    HASH_CMD="sha256sum"
                else
                    HASH_CMD="shasum -a 256"
                fi
                echo "version=$(rustc --version | $HASH_CMD | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

            # Restore cache from main branch (read-only)
            - name: Restore Rust cache
              uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                path: |
                    ~/.cargo/bin/
                    ~/.cargo/registry/index/
                    ~/.cargo/registry/cache/
                    ~/.cargo/git/db/
                    target/.rustc_info.json
                    target/.cargo-lock
                    target/debug/deps/
                    target/debug/build/
                    target/debug/.fingerprint/
                    target/debug/incremental/
                    target/release/deps/
                    target/release/build/
                    target/release/.fingerprint/
                    target/release/incremental/
                key: rust-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-${{ hashFiles('Cargo.toml') }}
                restore-keys: |
                    rust-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-

            - name: Run Clippy
              run: cargo clippy --all-targets --all-features -- -D warnings

            - name: Build (debug)
              run: cargo build --verbose

            - name: Build (release)
              run: cargo build --release --verbose

            # Includes tests/mcp_e2e.rs, which spawns the built binary over
            # stdio and drives tool dispatch + the request/response envelope
            # (formerly the Python tests/integration/test_mcp_tools.py harness).
            - name: Run tests
              run: cargo test --verbose

            # Independent-reader gate: confirm generated files are Altium-readable
            # (issue #68) by parsing them with pyaltiumlib. Dependencies are pinned
            # (requirements.txt) and isolated in a venv so the install is
            # reproducible; ORACLE_REQUIRE_DEPS turns a missing dependency into a
            # hard failure instead of a silent skip. Fails on any NEW regression.
            - name: Run Altium-readability oracle (pyaltiumlib)
              if: runner.os == 'Linux'
              env:
                  ORACLE_REQUIRE_DEPS: "1"
              run: |
                  python3 -m venv tests/integration/.venv
                  tests/integration/.venv/bin/pip install --quiet -r tests/integration/requirements.txt
                  tests/integration/.venv/bin/python tests/integration/test_altium_readability.py

    coverage:
        name: Code Coverage
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # v1.95.0 (latest stable)
              with:
                components: llvm-tools-preview

            - name: Install cargo-llvm-cov
              uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
              with:
                tool: cargo-llvm-cov

            - name: Get Rust version
              id: rust-version
              shell: bash
              run: echo "version=$(rustc --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

            # Restore cache from main branch (read-only)
            - name: Restore Rust cache
              uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                path: |
                    ~/.cargo/registry/index/
                    ~/.cargo/registry/cache/
                    ~/.cargo/git/db/
                    target/
                key: rust-coverage-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-${{ hashFiles('Cargo.toml') }}
                restore-keys: |
                    rust-coverage-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-

            - name: Generate coverage report (lcov)
              run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

            - name: Generate coverage summary
              run: cargo llvm-cov report --summary-only

            # The token is mandatory (see ci_main.yml). Dependabot cannot read
            # secrets, so its PRs would fail the upload — skip them instead.
            - name: Upload coverage to Codecov
              if: github.actor != 'dependabot[bot]'
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                files: lcov.info
                fail_ci_if_error: true
                verbose: true
              env:
                CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    ci-success:
        name: CI Success
        needs: [quick-checks, build, coverage]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: always()

        steps:
            - name: Check if all jobs succeeded
              run: |
                # Coverage may be skipped on forks/Dependabot lacking the
                # CODECOV_TOKEN secret, so treat "skipped" as acceptable.
                if [[ "${{ needs.quick-checks.result }}" != "success" ]] ||
                   [[ "${{ needs.build.result }}" != "success" ]] ||
                   [[ "${{ needs.coverage.result }}" != "success" &&
                      "${{ needs.coverage.result }}" != "skipped" ]]; then
                    echo "One or more jobs failed"
                    exit 1
                fi
                echo "All jobs completed successfully"
